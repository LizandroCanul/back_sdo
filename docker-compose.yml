version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: obras_yucatan_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: